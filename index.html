<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation | Komil & ???</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <style>
        :root { --primary-blue: #2b3a8c; --glass: rgba(255, 255, 255, 0.95); }
        body, html { margin: 0; padding: 0; font-family: 'Montserrat', sans-serif; background: #fdfbff; overflow-x: hidden; }

        /* KONVERT */
        #envelope { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; background: var(--primary-blue); display: flex; justify-content: center; align-items: center; z-index: 9999; transition: 1.2s cubic-bezier(0.7, 0, 0.3, 1); }
        .seal-container { text-align: center; cursor: pointer; animation: pulse 2s infinite; }
        .seal-container img { width: 100px; filter: drop-shadow(0 5px 15px rgba(0,0,0,0.3)); }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

        /* CONTENT */
        #content { display: none; text-align: center; }
        .header { padding: 80px 20px; background: #f4f7ff; border-bottom: 1px solid #eee; }
        .names { font-family: 'Dancing Script', cursive; font-size: 3.2rem; color: var(--primary-blue); margin: 10px 0; }

        /* RSVP FORMA */
        .rsvp-card {
            background: white; border-radius: 25px; padding: 30px 20px;
            margin: -30px auto 40px; width: 85%; max-width: 400px;
            box-shadow: 0 15px 45px rgba(0,0,0,0.07); position: relative; z-index: 10;
        }
        .input-field {
            width: 100%; padding: 15px; margin: 15px 0; border: 1px solid #ddd;
            border-radius: 12px; font-family: 'Montserrat'; box-sizing: border-box;
        }
        .options { display: flex; gap: 10px; margin: 15px 0; }
        .opt-btn {
            flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 12px;
            cursor: pointer; font-size: 13px; font-weight: 600; transition: 0.3s;
        }
        .opt-btn.active { background: var(--primary-blue); color: white; border-color: var(--primary-blue); }
        
        .submit-btn {
            background: var(--primary-blue); color: white; border: none;
            width: 100%; padding: 16px; border-radius: 30px; font-weight: bold;
            cursor: pointer; margin-top: 10px;
        }
        .submit-btn:disabled { background: #ccc; }

        /* TIMER */
        .timer { display: flex; justify-content: center; gap: 15px; padding: 40px 0; background: var(--primary-blue); color: white; }
        .t-item span { display: block; font-size: 1.8rem; font-weight: bold; }
    </style>
</head>
<body>

    <div id="envelope">
        <div class="seal-container" onclick="openMe()">
            <img src="seal.png" alt="Muhr">
            <p style="color: white; font-size: 10px; margin-top: 15px; letter-spacing: 2px;">OCHISH UCHUN BOSING</p>
        </div>
    </div>

    <div id="content">
        <div class="header">
            <p data-aos="fade-down">Sizni taklif etamiz</p>
            <h1 class="names" data-aos="zoom-in">Komil & ???</h1>
            <p style="font-weight: 600; letter-spacing: 2px;">27 DEKABR, 2026</p>
        </div>

        <div class="rsvp-card" data-aos="fade-up">
            <h3 style="color: var(--primary-blue); margin-bottom: 20px;">Tashrifingizni tasdiqlang</h3>
            <form id="wedding-form">
                <input type="text" name="ism" id="name" placeholder="Ismingiz va familiyangiz" required class="input-field">
                
                <div class="options">
                    <div class="opt-btn" onclick="setStatus('Kelaman', this)">Albatta boraman</div>
                    <div class="opt-btn" onclick="setStatus('Kelmayman', this)">Borolmayman</div>
                </div>
                <input type="hidden" name="holat" id="status" required>

                <button type="submit" class="submit-btn" id="send-btn">YUBORISH</button>
            </form>
            <div id="success-msg" style="display:none; color: green; font-weight: 600; padding: 20px;">
                Rahmat! Ma'lumotlaringiz qabul qilindi.
            </div>
        </div>

        <div class="timer">
            <div class="t-item"><span id="d">00</span>Kun</div>
            <div class="t-item"><span id="h">00</span>Soat</div>
            <div class="t-item"><span id="m">00</span>Min</div>
        </div>

        <div style="padding: 50px 20px;">
            <p style="font-family: 'Dancing Script', cursive; font-size: 1.8rem; color: var(--primary-blue);">Sizni kutib qolamiz!</p>
        </div>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        // STATUS TANLASH
        function setStatus(val, el) {
            document.getElementById('status').value = val;
            document.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
        }

        // GOOGLE SHEETS BILAN ALOQA
        const scriptURL = 'https://script.google.com/macros/s/AKfycbxr31odBSGT5ZV5j-4Kuhbqoa7LRqXDbB_iaAv1aimNy7GGciNKM0KdkhjXJhlio2dRXw/exec';
        const form = document.getElementById('wedding-form');

        form.addEventListener('submit', e => {
            e.preventDefault();
            if(!document.getElementById('status').value) {
                alert("Iltimos, kelishingizni tasdiqlang!");
                return;
            }

            document.getElementById('send-btn').disabled = true;
            document.getElementById('send-btn').innerText = "Yuborilmoqda...";

            fetch(scriptURL, { method: 'POST', body: new FormData(form)})
                .then(response => {
                    document.getElementById('wedding-form').style.display = 'none';
                    document.getElementById('success-msg').style.display = 'block';
                })
                .catch(error => {
                    alert('Xatolik! Qaytadan urinib ko\'ring.');
                    document.getElementById('send-btn').disabled = false;
                    document.getElementById('send-btn').innerText = "YUBORISH";
                });
        });

        // OCHISH FUNKSIYASI
        function openMe() {
            document.getElementById('envelope').style.transform = 'translateY(-100vh)';
            document.getElementById('content').style.display = 'block';
            setTimeout(() => { AOS.init(); }, 100);
            setInterval(updateTimer, 1000);
        }

        function updateTimer() {
            const target = new Date("December 27, 2026 18:00:00").getTime();
            const diff = target - new Date().getTime();
            if (diff > 0) {
                document.getElementById('d').innerText = Math.floor(diff / (1000 * 60 * 60 * 24));
                document.getElementById('h').innerText = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                document.getElementById('m').innerText = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            }
        }
    </script>
</body>
</html>
